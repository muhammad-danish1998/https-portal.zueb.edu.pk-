<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziauddin Examination Board Check Profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- STUDENT PHOTO -->
      <div class="photo-box">
        <img id="studentImage" src="" alt="Student Photo" />
      </div>

      <!-- DATA CARD -->
      <div class="card">
        <table>
          <tr>
            <td class="label">ROLL NO:-</td>
            <td class="value" id="rollno"></td>
          </tr>

          <tr>
            <td class="label">CANDIDATE'S NAME:</td>
            <td class="value" id="name"></td>
          </tr>

          <tr>
            <td class="label">FATHER'S NAME:</td>
            <td class="value" id="father"></td>
          </tr>

          <tr>
            <td class="label">NAME OF INSTITUTE:</td>
            <td class="value" id="institute"></td>
          </tr>

          <tr>
            <td class="label">ENROLLMENT NO:</td>
            <td class="value" id="enrollment"></td>
          </tr>

          <tr>
            <td class="label">GROUP:</td>
            <td class="value" id="group"></td>
          </tr>

          <tr>
            <td class="label">DATE OF BIRTH:</td>
            <td class="value" id="dob"></td>
          </tr>

          <tr>
            <td class="label">EXAM VENUE:</td>
            <td class="value" id="venue"></td>
          </tr>
        </table>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
